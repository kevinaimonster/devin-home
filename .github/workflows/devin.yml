name: Devin Agent

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened]

jobs:
  devin:
    # Only run when @devin is mentioned (or issue is opened with @devin in body)
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@devin')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@devin'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Run Devin Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: npx tsx src/agent/run.ts
