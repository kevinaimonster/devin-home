name: Devin Agent (Fallback)

# This workflow is a fallback for when the local server is not running.
# The primary mode is running src/agent/server.ts on your machine.
# To use this fallback, set ANTHROPIC_API_KEY in repo secrets.

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened]

jobs:
  devin:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@devin')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@devin'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run Devin Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: npx tsx src/agent/run.ts
