<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .hello-container {
            text-align: center;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            background-color: #f8fafc;
            max-width: 600px;
            width: 90%;
        }
        h1 {
            font-size: 4rem;
            font-weight: 800;
            color: #1e293b;
            margin: 0 0 1rem 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        p {
            font-size: 1.25rem;
            color: #64748b;
            line-height: 1.6;
            margin: 0 0 2rem 0;
        }
        .emoji {
            font-size: 3rem;
            display: block;
            margin-bottom: 1rem;
        }
        .subtitle {
            font-size: 1rem;
            color: #94a3b8;
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid #e2e8f0;
        }
        .time-display {
            font-size: 1.5rem;
            font-weight: 600;
            color: #334155;
            margin: 1.5rem 0;
            padding: 1rem;
            background-color: #f1f5f9;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            font-family: 'Courier New', Courier, monospace;
        }
        @media (max-width: 640px) {
            h1 {
                font-size: 2.5rem;
            }
            .emoji {
                font-size: 2rem;
            }
            p {
                font-size: 1rem;
            }
            .time-display {
                font-size: 1.25rem;
                padding: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="hello-container">
        <span class="emoji">👋</span>
        <h1>Hello World!</h1>
        <div class="time-display" id="current-time">Loading time...</div>
        <p>Welcome to this simple yet beautiful Hello World page. This page was created by Devin, the AI software engineer.</p>
        <div class="subtitle">
            Created with ❤️ for the kevinaimonster/devin-home project
        </div>
    </div>

    <script>
        function updateTime() {
            const now = new Date();
            const timeElement = document.getElementById('current-time');
            
            // Format the time: Day, Month Date, Year HH:MM:SS
            const options = { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            };
            
            const formattedTime = now.toLocaleDateString('en-US', options);
            timeElement.textContent = formattedTime;
        }
        
        // Update time immediately and then every second
        updateTime();
        setInterval(updateTime, 1000);
        
        // Also update when page becomes visible again (if user switches tabs)
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) {
                updateTime();
            }
        });
    </script>
</body>
</html>
